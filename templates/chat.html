{% extends "base.html" %}
{% block title %}Knowledge Base - Intellectual Curator{% endblock %}

{% block content %}
<aside id="sidebar" class="w-64 bg-surface-container-low border-r border-surface-container flex flex-col h-full shrink-0 relative">
  <div id="sidebarHeader" class="p-4 flex items-center justify-between border-b border-surface-container overflow-hidden">
      <button id="newSession" class="flex-1 py-2 px-4 bg-primary text-on-primary rounded-lg font-headline text-sm font-semibold flex items-center justify-center gap-2 hover:opacity-90 whitespace-nowrap">
          <span class="material-symbols-outlined text-sm">add</span> 
          <span class="sidebar-text">New Inquiry</span>
      </button>
      <button id="toggleSidebar" class="ml-2 p-2 rounded hover:bg-surface-container text-secondary shrink-0">
          <span class="material-symbols-outlined text-sm">menu_open</span>
      </button>
  </div>
  <div id="sessionList" class="flex-1 overflow-y-auto scrolled-content py-2 space-y-1"></div>
</aside>

<div id="resizer1" class="w-1 cursor-col-resize hover:bg-primary/20 z-10 transition-colors"></div>

<main class="flex-1 flex flex-col bg-surface-container-lowest overflow-hidden relative">
    <div id="chatArea" class="flex-1 overflow-y-auto scrolled-content p-6 flex flex-col"></div>

    <div class="p-6 bg-white dark:bg-[#0f1a33] border-t border-surface-container dark:border-[#1f2b4a]">
      <div class="max-w-5xl mx-auto relative flex items-center gap-4">
          <textarea id="userInput" rows="2" class="flex-1 bg-surface-container-highest border-none rounded-lg p-4 pr-16 text-sm focus:ring-1 focus:ring-primary min-h-[56px] resize-none" placeholder="질문을 입력하세요..."></textarea>
          <button id="sendBtn" class="w-12 h-12 bg-primary text-on-primary rounded-full flex shrink-0 items-center justify-center hover:opacity-90">
              <span class="material-symbols-outlined">send</span>
          </button>
      </div>
    </div>
</main>


<div id="resizer2" class="w-1 cursor-col-resize hover:bg-primary/20 z-10 transition-colors hidden"></div>

<aside id="rightPanel" class="w-80 bg-surface-container-low flex flex-col h-full shrink-0 border-l border-surface-container hidden">
    <div class="p-4 border-b border-surface-container">
        <h2 class="text-xs font-bold font-headline text-primary flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">bookmarks</span> Archive References
        </h2>
    </div>
    <div class="flex-1 flex flex-col overflow-hidden">
        <div class="panel flex flex-col min-h-[120px]" data-panel="topdocs">
            <div class="p-3 bg-surface-container-low border-b border-surface-container flex items-center justify-between z-10">
                <div class="text-xs font-bold">Top Documents</div>
                <button class="panel-max p-1 hover:bg-surface-container rounded" data-target="topdocs">⤢</button>
            </div>
            <div id="topDocs" class="flex-1 overflow-y-auto p-3 space-y-3"></div>
        </div>
        <div id="hresizer1" class="h-1 cursor-row-resize hover:bg-primary/20 transition-colors"></div>
        <div class="panel flex flex-col flex-1" data-panel="citations">
            <div class="p-3 bg-surface-container-low border-b border-surface-container flex items-center justify-between z-10">
                <div class="text-xs font-bold">Sentence Citations</div>
                <button class="panel-max p-1 hover:bg-surface-container rounded" data-target="citations">⤢</button>
            </div>
            <div id="citations" class="flex-1 overflow-y-auto p-3 space-y-3"></div>
        </div>
    </div>
</aside>

<div id="docModal" class="modal hidden fixed inset-0 z-[3000] flex items-center justify-center" aria-hidden="true">
    <div id="docModalBackdrop" class="absolute inset-0 bg-black/60"></div>
    <div class="relative w-[min(1100px,92vw)] h-[min(86vh,92vh)] bg-surface-container-lowest border border-surface-container rounded-2xl shadow-2xl flex flex-col overflow-hidden">
        <div class="p-4 border-b border-surface-container flex items-center justify-between">
            <div id="docModalTitle" class="font-bold text-sm truncate w-3/4">(Document)</div>
            <button id="docModalClose" class="px-3 py-1 bg-surface-container hover:bg-surface-container-high rounded text-xs">Close</button>
        </div>
        <div class="flex gap-2 p-3 border-b border-surface-container bg-surface-container-low">
            <button class="tab active px-4 py-2 rounded text-xs font-bold bg-primary text-on-primary" data-tab="md">Markdown</button>
            <button class="tab px-4 py-2 rounded text-xs font-bold bg-surface text-on-surface border border-surface-container" data-tab="images">Images</button>
        </div>
        <div id="docModalMd" class="viewer markdown-body p-6 overflow-y-auto h-full"></div>
        <div id="docModalImages" class="viewer hidden p-6 overflow-y-auto h-full space-y-4"></div>
    </div>
</div>
<div id="imgPreview" class="img-preview hidden fixed inset-0 z-[4000] bg-black/90 flex items-center justify-center p-8"></div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>window.__BOOT__ = { defaultIndex: "{{ default_index }}" };</script>
<script src="{{ url_for('static', path='/js/chat.js') }}"></script>
{% endblock %}
