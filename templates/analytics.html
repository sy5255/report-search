{% extends "base.html" %}
{% block title %}Visual Analytics - IFA Curator{% endblock %}

{% block content %}
{% if analytics_url %}
<iframe
    src="{{ analytics_url }}"
    class="flex-1 w-full h-full border-0 bg-background"
    title="Visual Analytics"
    referrerpolicy="no-referrer-when-downgrade"
    allow="fullscreen; clipboard-read; clipboard-write"
    loading="lazy"></iframe>
{% else %}
<div class="flex flex-1 items-center justify-center w-full h-full bg-background px-6">
    <div class="text-center max-w-md">
        <span class="material-symbols-outlined text-secondary" style="font-size:48px;">insert_chart</span>
        <h1 class="mt-3 text-xl font-bold text-on-surface">Visual Analytics</h1>
        <p class="mt-2 text-sm text-secondary leading-relaxed">
            임베드할 대시보드 URL이 아직 설정되지 않았습니다.<br/>
            서버 환경변수 <code class="px-1.5 py-0.5 rounded bg-surface-container text-on-surface font-mono text-xs">ANALYTICS_EMBED_URL</code> 을 지정하면
            이 영역에 해당 화면이 표시됩니다.
        </p>
    </div>
</div>
{% endif %}
{% endblock %}
