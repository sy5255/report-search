{% extends "base.html" %}
{% block title %}Digital Archive - Intellectual Curator{% endblock %}

{% block content %}
<div id="archiveContainer" class="flex w-full h-full overflow-hidden bg-background transition-all duration-300">
    
    <div id="archiveLeftPanel" class="w-[350px] md:w-[400px] border-r border-surface-container flex flex-col bg-surface-container-lowest shrink-0">
        <div class="p-4 border-b border-surface-container bg-surface-container-low">
            <div class="relative mb-3">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-secondary text-sm">search</span>
                <input type="text" id="archiveSearchInput" placeholder="정확한 키워드로 문서 검색..." 
                       class="w-full bg-surface-container-highest border border-surface-container rounded-lg py-2 pl-9 pr-4 text-sm text-on-surface outline-none focus:ring-1 focus:ring-primary transition-shadow">
            </div>
            <div class="flex justify-between items-center px-1">
                <span class="text-xs font-bold text-secondary" id="totalDocsCount">문서 불러오는 중...</span>
                <button id="sortToggleBtn" class="flex items-center gap-1 text-xs font-bold text-on-surface hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-sm">sort</span>
                    <span id="sortToggleText">최신순</span>
                </button>
            </div>
        </div>

        <div id="archiveList" class="flex-1 overflow-y-auto scrolled-content p-4 space-y-3 relative">
            </div>

        <div class="p-3 border-t border-surface-container bg-surface-container-low text-center">
            <button id="loadMoreBtn" class="hidden w-full px-4 py-2 bg-surface-container-highest hover:bg-surface-container text-xs font-bold text-on-surface rounded-lg transition-colors">
                더보기 (Load More)
            </button>
        </div>
    </div>

    <div id="archiveResizer" class="w-1 cursor-col-resize hover:bg-primary/20 z-10 transition-colors"></div>

    <div id="archiveRightPanel" class="flex-1 flex flex-col bg-surface-container-lowest relative overflow-hidden">
        <div class="h-14 border-b border-surface-container flex justify-between items-center px-6 bg-surface-container-low shrink-0">
            <h2 id="viewerTitle" class="text-sm font-bold font-headline text-primary truncate pr-4">문서를 선택해주세요</h2>
            <div class="flex gap-2 shrink-0">
                <button id="expandBtn" class="p-2 rounded hover:bg-surface-container-high text-secondary transition-colors" title="크게 보기">
                    <span class="material-symbols-outlined text-[18px]">open_in_full</span>
                </button>
            </div>
        </div>

        <div id="viewerContent" class="flex-1 overflow-y-auto scrolled-content p-8 markdown-body text-sm leading-relaxed text-on-surface">
            <div class="flex h-full items-center justify-center text-secondary">
                좌측 목록에서 문서를 선택하면 내용이 표시됩니다.
            </div>
        </div>
    </div>

</div>

<div id="imgPreview" class="img-preview hidden fixed inset-0 z-[4000] bg-black/90 flex items-center justify-center p-8"></div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{{ url_for('static', path='/js/archive.js') }}?v=2"></script>
{% endblock %}
