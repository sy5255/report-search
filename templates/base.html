<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Intellectual Curator{% endblock %}</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="{{ url_for('static', path='/css/design-tokens.css') }}"/>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--color-primary)",
                        "primary-container": "var(--color-primary-container)",
                        "on-primary": "var(--color-on-primary)",
                        "background": "var(--color-background)",
                        "surface": "var(--color-surface)",
                        "surface-container": "var(--color-surface-container)",
                        "surface-container-low": "var(--color-surface-container-low)",
                        "surface-container-lowest": "var(--color-surface-container-lowest)",
                        "surface-container-high": "var(--color-surface-container-high)",
                        "surface-container-highest": "var(--color-surface-container-highest)",
                        "on-surface": "var(--color-on-surface)",
                        "on-surface-soft": "var(--color-on-surface-soft)",
                        "secondary": "var(--color-secondary)",
                        "outline-variant": "var(--color-outline-variant)",
                        "error": "var(--color-error)",
                        /* Agent identity accents */
                        "rag": "var(--accent-rag)",
                        "rag-strong": "var(--accent-rag-strong)",
                        "db-accent": "var(--accent-db)",
                        "db-strong": "var(--accent-db-strong)"
                    },
                    fontFamily: {
                        "headline": ["Pretendard Variable", "Pretendard", "Inter", "sans-serif"],
                        "body": ["Pretendard Variable", "Pretendard", "Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "SFMono-Regular", "Menlo", "Consolas", "monospace"]
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', path='/css/chat.css') }}">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .scrolled-content::-webkit-scrollbar { width: 4px; height: 4px; }
        .scrolled-content::-webkit-scrollbar-track { background: transparent; }
        .scrolled-content::-webkit-scrollbar-thumb { background: var(--color-outline-variant); border-radius: 10px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-on-surface font-body h-screen flex flex-col overflow-hidden">

    <header class="glass border-b border-surface-container flex items-center justify-between px-6 h-16 w-full shrink-0 z-50">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2.5">
                <img src="{{ url_for('static', path='/images/logo.svg') }}" alt="" width="32" height="32" class="shrink-0"/>
                <div class="flex items-baseline gap-2">
                    <h1 class="text-xl font-bold tracking-tight font-headline">Intellectual Curator</h1>
                </div>
            </div>
            <nav class="hidden md:flex items-center gap-6">
                <a href="/chat" class="text-sm font-medium transition-colors {% if active_tab == 'knowledge_base' %} border-b-2 border-primary text-on-surface pb-1 {% else %} text-secondary hover:text-on-surface {% endif %}">Knowledge Base</a>
                <a href="/archive" class="text-sm font-medium transition-colors {% if active_tab == 'archive' %} border-b-2 border-primary text-on-surface pb-1 {% else %} text-secondary hover:text-on-surface {% endif %}">Digital Archive</a>
                <a href="/analytics" class="text-sm font-medium transition-colors text-secondary hover:text-on-surface">Visual Analytics</a>
                <a href="/trace" class="text-sm font-medium transition-colors {% if active_tab == 'trace' %} border-b-2 border-primary text-on-surface pb-1 {% else %} text-secondary hover:text-on-surface {% endif %}">Cognitive Trace</a>
            </nav>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="/settings" class="p-2 rounded-full hover:bg-surface-container transition-colors text-secondary {% if active_tab == 'settings' %}text-on-surface{% endif %}" aria-label="설정" title="설정">
                <span class="material-symbols-outlined">settings</span>
            </a>
            <button id="themeToggleGlobal" class="p-2 rounded-full hover:bg-surface-container transition-colors" aria-label="라이트/다크 모드 전환" title="테마 전환">
                <span class="material-symbols-outlined text-secondary" id="themeIcon">light_mode</span>
            </button>
            <button id="logoutGlobal" class="px-3 py-1.5 rounded-full bg-error/10 text-error text-xs font-bold hover:bg-error/20 transition-colors">Logout</button>
            <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary text-xs font-bold uppercase" title="{{ user_id }}">
                {{ (user_id|string)[:2] if user_id else 'SY' }}
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        {% block content %}{% endblock %}
    </div>

    <script>
      // 사용자 폰트 크기 즉시 적용 (FOUC 방지)
      try {
        var f = localStorage.getItem("rs_font_size");
        if (f) document.documentElement.style.setProperty("--font-base", f);
      } catch(_){}
    </script>

    <script src="{{ url_for('static', path='/js/toast.js') }}"></script>

    {% block scripts %}{% endblock %}

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const htmlEl = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');

            // 초기 테마 설정 반영 (로컬 스토리지 기준)
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlEl.classList.add('dark');
                if (themeIcon) themeIcon.textContent = "dark_mode";
            } else {
                htmlEl.classList.remove('dark');
                if (themeIcon) themeIcon.textContent = "light_mode";
            }

            // 테마 토글 버튼 이벤트
            const themeBtn = document.getElementById('themeToggleGlobal');
            if (themeBtn) {
                themeBtn.addEventListener('click', () => {
                    // 전환 순간 트랜지션을 꺼서 전체가 한 번에 바뀌도록 (영역별 시간차 제거)
                    htmlEl.classList.add('theme-no-transition');
                    htmlEl.classList.toggle('dark');
                    const isDark = htmlEl.classList.contains('dark');
                    localStorage.theme = isDark ? 'dark' : 'light';
                    if (themeIcon) themeIcon.textContent = isDark ? "dark_mode" : "light_mode";
                    // 두 프레임 뒤 트랜지션 복원 (리페인트 완료 후)
                    requestAnimationFrame(() => requestAnimationFrame(() => {
                        htmlEl.classList.remove('theme-no-transition');
                    }));
                });
            }

            // 3. 로그아웃 버튼 클릭 이벤트 (완벽 수정)
            const logoutBtn = document.getElementById('logoutGlobal');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    const ok = window.Toast
                      ? await window.Toast.confirm("로그아웃 하시겠습니까?", { okText: "로그아웃", destructive: true })
                      : confirm("로그아웃 하시겠습니까?");
                    if (!ok) return;
                    try {
                        // main.py에 정의된 정확한 경로(/logout)로 POST 요청
                        await fetch('/logout', { method: 'POST' });
                        
                        // 💡 핵심 수정: 존재하지 않는 '/login'이 아니라 로그인 화면이 있는 '/' 로 이동
                        window.location.href = '/';
                    } catch (err) {
                        console.error('Logout error:', err);
                        window.location.href = '/'; 
                    }
                });
            }
        });
    </script>
</body>
</html>
